name: Feature request
description: Suggest an improvement to the engine, modes, or docs
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        English or 中文 both welcome.
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that PaperJury makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Review engine (reviewers / jury / judge / clerk)
        - Edit safety / guards
        - Compile / submission-readiness
        - Modes (direct-edit / review / auto)
        - Docs / onboarding
        - Other
    validations:
      required: false
